<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left-bar {
            position:fixed;
            top: 20px;
            left: 20px;
        }   
        .right-bar {
            position:fixed;
            top: 20px;
            right: 20px;
        }
        #search-section {
            text-align: center;
            margin-top: 100px;
        }
        .n1 {
            color: #4CAF50;
        }
        .n2 {
            color: #FF5733;
        }
        .tag-line {
            color: #9ad7f1;
        }
        .lens {
            position: relative;
            left:35px;
        }
        .search-box {
            padding: 15px 30px 15px 45px;
            border-radius: 30px;
            width:45%;
        }
        #suggestion-box{
            /* border: 1px solid #ccc; */
            width: 45%;
            margin-left: 25%;
            padding: 10px 10px 5px 45px;
        }
        #suggestion-item {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

    </style>
</head>
<body>
    <div>
        <span class="left-bar">&#9881</span>
        <span class="right-bar">&#8226 Online | &#128336-ms</span>
    </div>
    <div id="search-section">
        <h1 id="title">&#x1F451 <span class="n1">Akshaya's</span> <span class="n2">Kingdom</span> &#x1F451</h1>
        <p class="tag-line"> One million phrases.Four Algorithms.Prefix based Auto Suggest.</p>
        <span>
            <span class="lens">&#128269</span>
            <input class="search-box" id="search-box" placeholder="Search here...">
        </span>
        <div id="suggestion-box">
            <!-- Suggestion Box -->
        </div>
    </div>
     <script>
        var searchBox = document.getElementById("search-box");
        var suggestionBox = document.getElementById("suggestion-box");
        searchBox.addEventListener("input", function() {
            // 1:Get user typed text
            var userInput = searchBox.value;
            if(userInput.trim() === "") {

            } else {
                var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url3 = "&algorithm=brute&limit=10&weighted=false";
                var url = url1 + userInput + url3;
                // 2:Make api call to get suggestions
                fetch(url).
                    then(function(response){
                        return response.json();
                    })
                    .then(function(data){
                        console.log(data);

                        // 3 : Display data in HTML
                        var resultsArray = data.results;
                        var htmlResults = "";
                        for(var i=0; i< resultsArray.length; i++)
                        {
                            htmlResults+= "<div id='suggestion-item'>" + resultsArray[i].text + "</div>"
                        }
                        suggestionBox.innerHTML = htmlResults;
                    })
            }
        })
     </script>
</body>
</html>
